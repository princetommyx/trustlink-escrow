<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - TrustLink Escrow</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%233B82F6'/%3E%3Cstop offset='1' stop-color='%2306B6D4'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Crect x='10' y='10' width='12' height='12' rx='3' fill='white'/%3E%3C/svg%3E">
    <meta name="description" content="Reset your TrustLink Escrow password">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-left">
            <div class="glow-blob blob-1"></div>
            <div class="glow-blob blob-2" style="top: auto; bottom: -200px; left: -100px;"></div>
            <a href="index.html" class="logo auth-logo">
                <div class="logo-icon auth-logo-icon"></div>
                TRUSTLINK DASHBOARD
            </a>
            <p class="auth-tagline">Secure Escrow for Social Commerce</p>
        </div>
        <div class="auth-right">
            <div class="auth-form-container">
                <div style="margin-bottom: 24px;">
                    <h2 style="color: var(--text-main); font-family: var(--font-heading); margin-bottom: 8px;">Reset Password</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Enter your email address and we'll send you a link to reset your password.</p>
                </div>
                <form class="auth-form reset-form" action="#">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="reset-email" placeholder="Enter your registered email" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-large auth-btn">SEND RESET LINK</button>

                    <div class="auth-switch">
                        Remembered your password? <a href="login.html">Sign in</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script type="module" src="auth-handler.js"></script>
</body>

</html>
