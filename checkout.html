<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustLink Escrow - Secure Checkout</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%233B82F6'/%3E%3Cstop offset='1' stop-color='%2306B6D4'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Crect x='10' y='10' width='12' height='12' rx='3' fill='white'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <style>
        .checkout-card {
            background: rgba(10, 15, 28, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            margin: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .escrow-amount {
            font-size: 3rem;
            font-family: var(--font-heading);
            font-weight: 700;
            color: var(--success);
            margin: 20px 0;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: var(--warning); border: 1px solid var(--warning); }
        .status-funded { background: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid #3b82f6; }
        .status-dispatched { background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid var(--success); }
        .status-completed { background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid var(--success); }
        
        .checkout-details {
            text-align: left;
            margin: 24px 0;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 12px;
        }
        .checkout-details p { margin: 8px 0; color: rgba(255,255,255,0.8); }
        .checkout-details strong { color: #fff; }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* Loading Spinner */
        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .checkout-card { padding: 24px 16px; border-radius: 16px; }
            .escrow-amount { font-size: 2.2rem; }
            .checkout-details { padding: 16px; }
        }
    </style>
</head>
<body class="auth-wrapper" style="justify-content: center; padding: 20px;">
    
    <div class="checkout-card" id="checkout-container">
        <div class="loader" id="loader"></div>
        <h2 id="loading-text">Loading Escrow...</h2>
        
        <div id="escrow-content" class="hidden">
            <h2 style="font-family: var(--font-heading); margin-bottom: 8px;">TrustLink Escrow Checkout</h2>
            <div id="escrow-status" class="status-badge status-pending">Status: Pending Payment</div>
            
            <div class="escrow-amount" id="escrow-amount">GH₵ 0.00</div>
            
            <div class="checkout-actions">
                <button id="btn-pay-card" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 1.1rem; margin-bottom: 12px;">Pay Securely via Moolre Web</button>
                
                <div class="ussd-divider" style="text-align: center; margin: 16px 0; color: #888;">OR PAY VIA USSD PUSH</div>

                <div class="ussd-form" style="background: rgba(255,255,255,0.05); padding: 16px; border-radius: 8px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1);">
                    <label style="display: block; margin-bottom: 8px; color: #ccc;">Select Network</label>
                    <select id="ussd-network" class="input-field" style="width: 100%; margin-bottom: 12px; padding: 10px; background: rgba(0,0,0,0.2); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;">
                        <option value="13">MTN Mobile Money</option>
                        <option value="6">Telecel Cash</option>
                        <option value="7">AT Money</option>
                    </select>
                    
                    <label style="display: block; margin-bottom: 8px; color: #ccc;">Phone Number</label>
                    <input type="tel" id="ussd-phone" class="input-field" placeholder="e.g. 0541234567" style="width: 100%; margin-bottom: 16px; padding: 10px; background: rgba(0,0,0,0.2); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;">
                    
                    <button id="btn-pay-ussd" class="btn btn-outline" style="width: 100%; padding: 12px;">Send USSD Prompt to Phone</button>
                </div>
            </div>
            
            <div class="checkout-details">
                <p><strong>Seller:</strong> <span id="seller-name">Loading...</span></p>
                <p><strong>Description:</strong> <span id="escrow-desc">Loading...</span></p>
                <p id="escrow-delivery-row" style="display: none;"><strong>Expected Delivery:</strong> <span id="escrow-delivery"></span></p>
                <p><strong>Escrow ID:</strong> <span id="escrow-id-display">Loading...</span></p>
            </div>
            
            <div class="action-buttons" id="action-buttons">
                <!-- Dynamically injected based on status -->
            </div>
            
            <div style="margin-top: 24px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.8rem; color: rgba(255,255,255,0.5);">
                <img src="moolre.webp" alt="Moolre" style="height: 16px;">
                <span>Payments secured by Moolre</span>
            </div>
        </div>
    </div>

    <!-- Firebase & Custom Script -->
    <script type="module" src="checkout.js"></script>
</body>
</html>
