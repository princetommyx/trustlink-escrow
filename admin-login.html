<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TrustLink Escrow</title>
    <meta name="description" content="Admin Login to TrustLink Escrow">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link
        href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-left">
            <div class="glow-blob blob-1"></div>
            <div class="glow-blob blob-2" style="top: auto; bottom: -200px; left: -100px;"></div>
            <a href="index.html" class="logo auth-logo">
                <div class="logo-icon auth-logo-icon"></div>
                TRUSTLINK ADMIN
            </a>
            <p class="auth-tagline">Administrator Access Portal</p>
        </div>
        <div class="auth-right">
            <div class="auth-form-container">
                    <form class="auth-form" action="#">
                        
                        <div class="form-group">
                            <label for="email">Admin Email</label>
                            <input type="text" id="email" placeholder="Enter your admin email" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="password" placeholder="Enter your password" required>
                                <button type="button" class="toggle-password"
                                    onclick="togglePassword('password', this)">Show</button>
                            </div>
                        </div>
                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox">
                                <span>Remember me</span>
                            </label>
                            <a href="reset-password.html" class="forgot-password">Recover password</a>
                        </div>
                        <button type="submit" class="btn btn-primary btn-large auth-btn" style="background: linear-gradient(135deg, #9333ea, #7e22ce); box-shadow: 0 4px 15px rgba(147, 51, 234, 0.4);">SIGN IN AS ADMIN</button>
                        
                    </form>
            </div>
        </div>
    </div>

    <script type="module" src="auth-handler.js"></script>
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = 'Hide';
            } else {
                input.type = 'password';
                btn.textContent = 'Show';
            }
        }
    </script>
</body>

</html>
